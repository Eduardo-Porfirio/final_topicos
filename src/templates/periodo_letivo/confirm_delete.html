{% extends "base.html" %}

{% block title %}Excluir Período - Gestão Acadêmica{% endblock %}

{% block content %}
<div class="max-w-md mx-auto bg-white p-8 rounded-lg shadow-lg border text-center">
    <div class="text-red-500 mb-4">
        <svg class="mx-auto h-16 w-16" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
        </svg>
    </div>
    <h2 class="text-2xl font-bold mb-4 text-gray-800">Confirmar Exclusão</h2>
    <p class="text-gray-600 mb-8">Tem certeza que deseja excluir o período <strong>"{{ obj.nmperiodo }}"</strong>? Esta ação não pode ser desfeita.</p>
    
    <form method="post">
        {% csrf_token %}
        <div class="flex flex-col space-y-3">
            <button type="submit" class="w-full bg-red-600 text-white font-bold py-2 px-4 rounded-lg hover:bg-red-700 transition duration-300">
                Sim, Excluir Definitivamente
            </button>
            <a href="{% url 'list_periodos' %}" class="w-full bg-gray-200 text-gray-700 font-bold py-2 px-4 rounded-lg hover:bg-gray-300 transition duration-300">
                Cancelar
            </a>
        </div>
    </form>
</div>
{% endblock %}
