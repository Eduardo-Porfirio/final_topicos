{% extends "base.html" %}

{% block title %}Página Não Encontrada - 404{% endblock %}

{% block content %}
<div class="flex flex-col items-center justify-center h-screen-75 text-center">
    <div class="bg-white p-10 rounded-lg shadow-xl border border-gray-200">
        <h1 class="text-9xl font-bold text-blue-800">404</h1>
        <p class="text-2xl font-semibold mt-4 text-gray-700">Página não encontrada!</p>
        <p class="text-gray-500 mt-2 mb-8">Desculpe, a página que você está procurando não existe ou foi movida.</p>
        
        <a href="{% url 'dashboard' %}" class="bg-blue-800 hover:bg-blue-900 text-white font-bold py-3 px-6 rounded-lg transition duration-300">
            Voltar para o Início
        </a>
    </div>
</div>

<style>
    .h-screen-75 { height: 75vh; }
</style>
{% endblock %}
