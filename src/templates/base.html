<!doctype html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>{% block title %}Gestão Acadêmica{% endblock %}</title>
        <!-- Tailwind CSS via CDN para facilitar o estilo básico -->
        <script src="https://cdn.tailwindcss.com"></script>
        <!-- HTMX para interações dinâmicas sem complexidade de JS -->
        <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    </head>
    <body class="bg-gray-100 font-sans leading-normal tracking-normal">
        <nav class="bg-green-800 p-4 shadow-lg">
            <div class="container mx-auto flex justify-between items-center">
                <a
                    href="{% url 'dashboard' %}"
                    class="text-white text-xl font-bold"
                    >Painel de Gestão</a
                >
                <div class="space-x-4 flex items-center">
                    <a href="{% url 'list_periodos' %}" class="text-blue-100 hover:text-white text-sm">Períodos</a>
                    <a href="{% url 'dashboard' %}" class="text-blue-100 hover:text-white text-sm">Painel</a>
                    {% if user.is_authenticated %}
                    <span class="text-blue-300 text-sm"
                        >| Olá, {{ user.username }}</span
                    >
                    <form
                        action="{% url 'logout' %}"
                        method="post"
                        class="inline"
                    >
                        {% csrf_token %}
                        <button
                            type="submit"
                            class="text-red-300 hover:text-white text-sm"
                        >
                            Sair
                        </button>
                    </form>
                    {% else %}
                    <a
                        href="{% url 'login' %}"
                        class="text-green-300 hover:text-white text-sm"
                        >Entrar</a
                    >
                    {% endif %}
                </div>
            </div>
        </nav>

        <main class="container mx-auto mt-8 px-4">
            {% block content %} {% endblock %}
        </main>

        <footer
            class="container mx-auto text-center py-10 text-gray-500 text-sm"
        >
            &copy; 2026 - Sistema de Gestão Acadêmica
        </footer>
    </body>
</html>
