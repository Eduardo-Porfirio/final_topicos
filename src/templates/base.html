<!doctype html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>{% block title %}Gestão Acadêmica{% endblock %}</title>
        <!-- Tailwind CSS via CDN para facilitar o estilo básico -->
        <script src="https://cdn.tailwindcss.com"></script>
        <!-- HTMX para interações dinâmicas sem complexidade de JS -->
        <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    </head>
    <body class="bg-gray-100 font-sans leading-normal tracking-normal">
        <nav class="bg-green-800 p-4 shadow-lg">
            <div class="container mx-auto flex justify-between items-center">
                <a
                    href="{% url 'dashboard' %}"
                    class="text-white text-xl font-bold"
                    >Painel de Gestão</a
                >
                <div class="space-x-6 flex items-center">
                    
                    {% if user.is_authenticated %}
                    <!-- User Dropdown -->
                    <div class="relative inline-block text-left">
                        <button type="button" class="flex items-center space-x-3 text-blue-100 hover:text-white focus:outline-none group" id="user-menu-button">
                            <span class="text-sm font-medium hidden md:block">{{ user.username }}</span>
                            <div class="h-9 w-9 rounded-full bg-green-700 border-2 border-green-600 flex items-center justify-center text-white font-bold group-hover:border-white transition-all shadow-sm">
                                {{ user.username|first|upper }}
                            </div>
                        </button>
                        
                        <!-- Dropdown Menu -->
                        <div id="user-menu-dropdown" class="hidden absolute right-0 mt-3 w-56 bg-white rounded-lg shadow-xl py-2 z-50 ring-1 ring-black ring-opacity-5 focus:outline-none border border-gray-100">
                            <div class="px-4 py-2 border-b border-gray-50 mb-1 md:hidden">
                                <p class="text-xs text-gray-400 uppercase font-bold tracking-wider">Usuário</p>
                                <p class="text-sm font-semibold text-gray-700">{{ user.username }}</p>
                            </div>

                            <a href="{% url 'dashboard' %}" class="flex items-center px-4 py-2 text-sm text-gray-700 hover:bg-green-50 hover:text-green-700 transition-colors">
                                <svg class="w-4 h-4 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
                                Painel
                            </a>
                            
                            <a href="{% url 'list_periodos' %}" class="flex items-center px-4 py-2 text-sm text-gray-700 hover:bg-green-50 hover:text-green-700 transition-colors">
                                <svg class="w-4 h-4 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                                Períodos Letivos
                            </a>

                            <div class="border-t border-gray-100 mt-1 mb-1"></div>

                            <a href="{% url 'telegram_management' %}" class="flex items-center px-4 py-2 text-sm text-gray-700 hover:bg-green-50 hover:text-green-700 transition-colors">
                                <svg class="w-4 h-4 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"></path></svg>
                                API Telegram
                            </a>

                            <a href="{% url 'telegram_disparos' %}" class="flex items-center px-4 py-2 text-sm text-gray-700 hover:bg-green-50 hover:text-green-700 transition-colors">
                                <svg class="w-4 h-4 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
                                Disparos Telegram
                            </a>
                            
                            <a href="{% url 'telegram_settings' %}" class="flex items-center px-4 py-2 text-sm text-gray-700 hover:bg-green-50 hover:text-green-700 transition-colors">
                                <svg class="w-4 h-4 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.756 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                                Configurações
                            </a>
                            
                            <div class="border-t border-gray-100 mt-2 pt-1">
                                <form action="{% url 'logout' %}" method="post" id="logout-form">
                                    {% csrf_token %}
                                    <button type="submit" class="w-full flex items-center px-4 py-2 text-sm text-red-600 hover:bg-red-50 transition-colors">
                                        <svg class="w-4 h-4 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                                        Sair
                                    </button>
                                </form>
                            </div>
                        </div>
                    </div>
                    {% else %}
                    <a href="{% url 'login' %}" class="bg-green-700 hover:bg-green-600 text-white px-4 py-2 rounded-lg text-sm font-bold transition-colors">Entrar</a>
                    {% endif %}
                </div>
            </div>
        </nav>

        <main class="container mx-auto mt-8 px-4">
            {% block content %} {% endblock %}
        </main>

        <footer class="container mx-auto text-center py-10 text-gray-500 text-sm">
            &copy; 2026 - Sistema de Gestão Acadêmica
        </footer>

        <script>
            // Lógica do Menu Dropdown
            document.addEventListener('DOMContentLoaded', function() {
                const btn = document.getElementById('user-menu-button');
                const dropdown = document.getElementById('user-menu-dropdown');
                
                if (btn && dropdown) {
                    btn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        dropdown.classList.toggle('hidden');
                    });

                    // Fechar ao clicar fora
                    document.addEventListener('click', (e) => {
                        if (!dropdown.classList.contains('hidden') && !dropdown.contains(e.target)) {
                            dropdown.classList.add('hidden');
                        }
                    });
                }
            });
        </script>
    </body>
</html>
