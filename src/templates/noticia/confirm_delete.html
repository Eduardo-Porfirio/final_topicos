{% extends "base.html" %}
{% block content %}
<div class="max-w-md mx-auto bg-white p-8 rounded-lg shadow-lg border text-center">
    <h2 class="text-2xl font-bold mb-4 text-gray-800">Confirmar Exclusão</h2>
    <p class="text-gray-600 mb-8">Excluir notícia <strong>"{{ obj.titulo }}"</strong>?</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="w-full bg-red-600 text-white font-bold py-2 px-4 rounded-lg hover:bg-red-700">Sim, Excluir</button>
        <a href="{% url 'list_noticias' %}" class="block mt-4 text-gray-500">Cancelar</a>
    </form>
</div>
{% endblock %}
