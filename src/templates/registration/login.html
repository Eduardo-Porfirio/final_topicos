{% extends "base.html" %}

{% block title %}Login - Gestão Acadêmica{% endblock %}

{% block content %}
<div class="flex justify-center items-center h-screen-75">
    <div class="w-full max-w-md bg-white p-8 rounded-lg shadow-lg border">
        <h2 class="text-2xl font-bold mb-6 text-center text-gray-800">Acesso ao Sistema</h2>
        
        <form method="post" class="space-y-4">
            {% csrf_token %}
            
            {% if form.errors %}
                <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded relative mb-4">
                    Usuário ou senha incorretos.
                </div>
            {% endif %}

            <div>
                <label class="block text-gray-700 text-sm font-bold mb-2">Usuário</label>
                <input type="text" name="username" required class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <div>
                <label class="block text-gray-700 text-sm font-bold mb-2">Senha</label>
                <input type="password" name="password" required class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <button type="submit" class="w-full bg-blue-800 text-white font-bold py-2 px-4 rounded-lg hover:bg-blue-900 transition duration-300">
                Entrar
            </button>
        </form>
    </div>
</div>

<style>
    .h-screen-75 { height: 75vh; }
</style>
{% endblock %}
